<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}math{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=asset_version) }}">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">M</span>
        <span class="brand-copy">
          <strong>math</strong>
          <small>基于原始 HTML 题库抽取</small>
        </span>
      </a>
      <nav class="top-nav">
        {% for item in subjects %}
        <a href="{{ url_for('subject_detail', subject_id=item.id) }}" class="top-nav-link">{{ item.name }}</a>
        {% endfor %}
        <a href="{{ url_for('favorites') }}" class="top-nav-link">收藏</a>
      </nav>
    </header>

    {% block content %}{% endblock %}
  </div>

  <div id="analysis-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="1"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="analysis-title">
      <div class="modal-header">
        <div>
          <h2 id="analysis-title">解析</h2>
          <p id="analysis-subtitle" class="modal-subtitle"></p>
        </div>
        <button type="button" class="modal-close" data-close-modal="1">关闭</button>
      </div>
      <div id="analysis-body" class="modal-body"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js', v=asset_version) }}"></script>
</body>
</html>
